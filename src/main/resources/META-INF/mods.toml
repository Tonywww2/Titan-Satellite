modLoader = "javafml"
loaderVersion = "[47,)"
license = "${license}"

[[mods]]
modId = "${id}"
version = "${version}"
displayName = "${name}"
authors = "${authors}"
description = '''
${description}
'''

[[mixins]]
config = "titan_satellite.mixins.json"

[[dependencies.titan_satellite]]
modId = "forge"
mandatory = true
versionRange = "[47,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.titan_satellite]]
modId = "minecraft"
mandatory = true
versionRange = "[1.20.1,1.21)"
ordering = "NONE"
side = "BOTH"

# 饰品前置（Curios）：本模组饰品依赖 Curios API，必需
[[dependencies.titan_satellite]]
modId = "curios"
mandatory = true
versionRange = "[5.9,)"
ordering = "AFTER"
side = "BOTH"

# 可选前置（联动配方用；缺省不影响加载）
[[dependencies.titan_satellite]]
modId = "create"
mandatory = false
versionRange = "[0,)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.titan_satellite]]
modId = "mekanism"
mandatory = false
versionRange = "[0,)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.titan_satellite]]
modId = "farmersdelight"
mandatory = false
versionRange = "[0,)"
ordering = "AFTER"
side = "BOTH"
